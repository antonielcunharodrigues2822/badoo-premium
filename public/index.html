<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namoro Online | Encontre sua metade</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #5f1bb5;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .hidden { display: none !important; }
        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        label {
            display: block;
            text-align: left;
            font-size: 14px;
            color: #555;
            margin-top: 5px;
            font-weight: bold;
        }
        button {
            width: 100%;
            background: #ff4365;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover { background: #e03254; }
        .link-alternar {
            display: inline-block;
            margin-top: 15px;
            color: #5f1bb5;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .link-alternar:hover { text-decoration: underline; }
        .chat-container { background: #222; padding: 20px; border-radius: 15px; width: 100%; max-width: 500px; }
        .perfil-topo { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <!-- TELA DE CADASTRO -->
    <div id="tela-cadastro" class="card">
        <h2 style="color: #5f1bb5; margin-top: 0;">Namoro Online 🟢</h2>
        <p style="color: #cc0000; font-size: 14px; font-weight: bold;">Verificação obrigatória | Apenas para maiores de 18 anos</p>
        
        <input type="text" id="nome" placeholder="Nome Completo">
        
        <label for="dataNascimento">Data de Nascimento:</label>
        <input type="date" id="dataNascimento">
        
        <label for="cpf">CPF (Somente números):</label>
        <input type="text" id="cpf" placeholder="Ex: 12345678909" maxlength="11">
        
        <select id="genero">
            <option value="">Selecione seu gênero</option>
            <option value="Masculino">Masculino</option>
            <option value="Feminino">Feminino</option>
            <option value="Outro">Outro</option>
        </select>
        
        <input type="text" id="foto" placeholder="URL de uma foto de perfil">
        
        <button id="btn-cadastrar">Verificar Dados e Entrar</button>
        
        <span class="link-alternar" id="ir-para-login">Já tem uma conta? Faça Login</span>
    </div>

    <!-- TELA DE LOGIN -->
    <div id="tela-login" class="card hidden">
        <h2 style="color: #5f1bb5; margin-top: 0;">Fazer Login</h2>
        <p style="color: #555; font-size: 14px;">Insira seu CPF verificado para acessar sua conta.</p>
        
        <label for="cpf-login">CPF cadastrado:</label>
        <input type="text" id="cpf-login" placeholder="Digite seus 11 números" maxlength="11">
        
        <button id="btn-logar">Entrar na minha Conta</button>
        
        <span class="link-alternar" id="ir-para-cadastro">Não tem conta? Cadastre-se</span>
    </div>

    <!-- TELA DE CHAT -->
    <div id="tela-chat" class="chat-container hidden">
        <div class="perfil-topo">
            <img id="user-avatar" src="" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;">
            <h3 id="user-boasvindas" style="margin: 0;">Olá</h3>
        </div>
        
        <div style="background: #333; padding: 15px; border-radius: 10px; min-height: 100px; margin-bottom: 15px;">
            <p id="resultado" style="margin: 0; color: #00ffcc;">Mensagens aparecerão aqui...</p>
        </div>

        <div style="display: flex; gap: 10px;">
            <input type="text" id="msg" placeholder="Digite uma mensagem..." style="margin: 0;">
            <button id="enviar" style="margin: 0; width: auto; padding: 0 20px;">Enviar</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://namoro-online.onrender.com/';
        let usuarioAtual = null;

        // CONTROLE DE ALTERNÂNCIA DE TELAS
        document.getElementById('ir-para-login').addEventListener('click', () => {
            document.getElementById('tela-cadastro').classList.add('hidden');
            document.getElementById('tela-login').classList.remove('hidden');
        });

        document.getElementById('ir-para-cadastro').addEventListener('click', () => {
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('tela-cadastro').classList.remove('hidden');
        });

        // EVENTO DE LOGIN
        document.getElementById('btn-logar').addEventListener('click', async () => {
            const cpf = document.getElementById('cpf-login').value.trim();

            if (!cpf || cpf.length !== 11) {
                alert("Por favor, digite um CPF válido com 11 números.");
                return;
            }

            try {
                const res = await fetch(API_URL + 'api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cpf })
                });

                const resultado = await res.json();

                if (res.ok) {
                    alert('Login realizado com sucesso!');
                    usuarioAtual = resultado.usuario;

                    document.getElementById('tela-login').classList.add('hidden');
                    document.getElementById('tela-chat').classList.remove('hidden');
                    
                    document.getElementById('user-avatar').src = usuarioAtual.foto || 'https://unsplash.com';
                    document.getElementById('user-boasvindas').innerText = 'Olá, ' + usuarioAtual.nome;

                    puxarPerfis();
                } else {
                    alert('Erro no login: ' + (resultado.erro || 'Erro desconhecido'));
                }
            } catch (error) {
                console.error("Erro ao conectar no login:", error);
                alert("Erro ao conectar com o servidor.");
            }
        });

        // EVENTO DE CADASTRO CORRIGIDO (Adicionado o fechamento correto)
        document.getElementById('btn-cadastrar').addEventListener('click', async () => {
            const nome = document.getElementById('nome').value.trim();
            const dataNascimento = document.getElementById('dataNascimento').value;
            const cpf = document.getElementById('cpf').value.trim();
            const genero = document.getElementById('genero').value;
            const foto = document.getElementById('foto').value.trim() || 'https://unsplash.com';

            if (!nome || !dataNascimento || !cpf || !genero) {
                alert("Por favor, preencha todos os campos obrigatórios.");
                return;
            }

            if (cpf.length !== 11) {
                alert("O CPF informado deve conter exatamente 11 dígitos.");
                return;
            }

            const hoje = new Date();
            const nascimento = new Date(dataNascimento);
            let idadeCalculada = hoje.getFullYear() - nascimento.getFullYear();
            const mes = hoje.getMonth() - nascimento.getMonth();
            if (mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())) {
                idadeCalculada--;
            }

            if (idadeCalculada < 18) {
                alert("Cadastro negado. O sistema é exclusivo para maiores de 18 anos.");
                return;
            }

            const dadosFormulario = { nome, dataNascimento, cpf, genero, foto };

            try {
                const res = await fetch(API_URL + 'api/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosFormulario)
                });

                const resultado = await res.json();

                if (res.ok) {
                    alert('Perfil verificado e cadastrado com sucesso!');
                    usuarioAtual = resultado.usuario || dadosFormulario;

                    document.getElementById('tela-cadastro').classList.add('hidden');
                    document.getElementById('tela-chat').classList.remove('hidden');
                    
                    document.getElementById('user-avatar').src = usuarioAtual.foto;
                    document.getElementById('user-boasvindas').innerText = 'Olá, ' + usuarioAtual.nome;

                    puxarPerfis();
                } else {
                    alert('Erro no cadastro: ' + (resultado.erro || 'Erro desconhecido'));
                }
            } catch (error) {
                console.error("Erro ao conectar:", error);
                alert("Não foi possível conectar ao servidor. Tente atualizar a página.");
            }
        });

        // EVENTO DE ENVIAR MENSAGEM NO CHAT
