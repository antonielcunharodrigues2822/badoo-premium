<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badoo Premium Global 18+</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #5f1bb5;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .hidden { display: none !important; }
        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background: #ff4365;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover { background: #e03254; }
        .chat-container { background: #222; padding: 20px; border-radius: 15px; width: 100%; max-width: 500px; }
        .perfil-topo { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <!-- TELA DE CADASTRO -->
    <div id="tela-cadastro" class="card">
        <h2 style="color: #5f1bb5; margin-top: 0;">Criar Perfil 🟢</h2>
        <p style="color: #666; font-size: 14px;">Apenas para maiores de 18 anos</p>
        
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="number" id="idade" placeholder="Idade (Mínimo 18)">
        
        <select id="genero">
            <option value="">Selecione seu gênero</option>
            <option value="Masculino">Masculino</option>
            <option value="Feminino">Feminino</option>
            <option value="Outro">Outro</option>
        </select>
        
        <input type="text" id="foto" placeholder="URL de uma foto de perfil">
        
        <button id="btn-cadastrar">Entrar no App de Namoro</button>
    </div>

    <!-- TELA DE CHAT -->
    <div id="tela-chat" class="chat-container hidden">
        <div class="perfil-topo">
            <img id="user-avatar" src="" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;">
            <h3 id="user-boasvindas" style="margin: 0;">Olá</h3>
        </div>
        
        <div style="background: #333; padding: 15px; border-radius: 10px; min-height: 100px; margin-bottom: 15px;">
            <p id="resultado" style="margin: 0; color: #00ffcc;">Mensagens aparecerão aqui...</p>
        </div>

        <div style="display: flex; gap: 10px;">
            <input type="text" id="msg" placeholder="Digite uma mensagem..." style="margin: 0;">
            <button id="enviar" style="margin: 0; width: auto; padding: 0 20px;">Enviar</button>
        </div>
    </div>

    <!-- SCRIPT COM O FLUXO CORRIGIDO -->
    <script>
        // Correção na URL: Garante a barra "/" no final para não bugar as rotas abaixo
        const API_URL = 'http://localhost:3000/';

        let usuarioAtual = null;

        // EVENTO DE CADASTRO
        document.getElementById('btn-cadastrar').addEventListener('click', async () => {
            const nome = document.getElementById('nome').value;
            const idade = parseInt(document.getElementById('idade').value);
            const genero = document.getElementById('genero').value;
            const foto = document.getElementById('foto').value || 'https://unsplash.com';

            if (!nome || !idade || !genero) {
                alert("Preencha todos os campos.");
                return;
            }
            if (idade < 18) {
                alert("Proibido para menores de 18 anos.");
                return;
            }

            const dadosFormulario = { nome: nome, idade: idade, genero: genero, foto: foto };

            try {
                const res = await fetch(API_URL + 'api/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosFormulario)
                });

                const resultado = await res.json();

                if (res.ok) {
                    alert('Perfil cadastrado com sucesso!');
                    
                    usuarioAtual = resultado.usuario || dadosFormulario;

                    document.getElementById('tela-cadastro').classList.add('hidden');
                    document.getElementById('tela-chat').classList.remove('hidden');
                    
                    document.getElementById('user-avatar').src = usuarioAtual.foto;
                    document.getElementById('user-boasvindas').innerText = 'Olá, ' + usuarioAtual.nome;

                    puxarPerfis();
                } else {
                    alert('Erro no cadastro: ' + (resultado.erro || 'Erro desconhecido'));
                }
            } catch (error) {
                console.error("Erro ao conectar:", error);
                alert("Não foi possível conectar ao servidor Render.");
            }
        });

        // EVENTO DE ENVIAR MENSAGEM NO CHAT
        document.getElementById('enviar').addEventListener('click', async () => {
            const msg = document.getElementById('msg').value;
            if (!msg.trim()) return;

            try {
                const res = await fetch(API_URL + 'api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagem: msg })
                });

                const dados = await res.json();
                document.getElementById('resultado').innerText = "Resultado: " + (dados.filtrada || dados.mensagem);
                document.getElementById('msg').value = '';
            } catch (error) {
                console.error("Erro ao enviar mensagem:", error);
            }
        });

        // FUNÇÃO PARA PUXAR OS PERFIS
        async function puxarPerfis() {
            try {
                const res = await fetch(API_URL + 'api/perfis');
                const perfis = await res.json();

                let container = document.getElementById('lista-perfis');
                if (!container) {
                    container = document.createElement('div');
                    container.id = 'lista-perfis';
                    container.style.marginTop = '20px';
                    container.style.display = 'grid';
                    container.style.gap = '10px';
                    document.getElementById('tela-chat').appendChild(container);
                }
                container.innerHTML = '<h3>Descubra novos perfis:</h3>';

                const outrosPerfis = perfis.filter(p => p.nome !== usuarioAtual?.nome);

                outrosPerfis.forEach(perfil => {
                    const card = document.createElement('div');
                    card.style.background = '#333';
                    card.style.padding = '10px';
                    card.style.borderRadius = '8px';
                    card.style.display = 'flex';
                    card.style.alignItems = 'center';
                    card.style.gap = '15px';

                    card.innerHTML = '<img src="' + perfil.foto + '" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;">' +
                                     '<div>' +
                                     '<h4 style="margin:0; color: white;">' + perfil.nome + ', ' + perfil.idade + '</h4>' +
                                     '<p style="margin:0; color: #aaa; font-size: 12px;">' + perfil.genero + '</p>' +
                                     '</div>';
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Erro ao carregar perfis do MongoDB:", error);
            }
        }
    </script>
</body>
</html>
